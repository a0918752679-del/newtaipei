<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>V16 後台管理</title><style>body{font-family:'Microsoft JhengHei',Arial,sans-serif;background:#eef6ff;margin:0;color:#082b5f}.wrap{max-width:1100px;margin:28px auto;padding:0 18px}.hero{background:linear-gradient(135deg,#fff,#cde9ff);padding:28px;border-radius:24px;box-shadow:0 12px 30px #bfd7ec}h1{font-size:38px;margin:0}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px;margin-top:20px}.card{background:#fff;border-radius:20px;padding:24px;box-shadow:0 10px 24px #caddeb}button,.btn{border:0;border-radius:12px;padding:14px 18px;background:#006bd6;color:white;font-size:17px;font-weight:800;cursor:pointer}.secondary{background:#18456e}.danger{background:#c83242}.log{white-space:pre-wrap;background:#06213f;color:#d8eeff;padding:16px;border-radius:14px;min-height:110px;overflow:auto}input{font-size:16px;padding:12px;border:1px solid #bdd2e6;border-radius:12px;width:100%;box-sizing:border-box}</style></head><body><main class="wrap"><section class="hero"><h1>V16 Ultimate 後台管理</h1><p>LINE Rich Menu、系統檢查、成果資料匯入。</p></section><section class="grid"><div class="card"><h2>LINE 圖文選單</h2><p>重新建立並套用最新科技風 Rich Menu。</p><button onclick="richmenu()">一鍵建立／更新 LINE 圖文選單</button></div><div class="card"><h2>系統狀態</h2><p>確認 Zeabur、Token、Webhook 狀態。</p><button class="secondary" onclick="health()">檢查 Health</button> <button class="secondary" onclick="debug()">查看 Debug</button></div><div class="card"><h2>成果資料匯入</h2><p>上傳「聲音照相資料匯入樣板」更新場次與KPI。</p><input id="file" type="file" accept=".xlsx,.xls"><br><br><button onclick="upload()">匯入成果資料</button></div></section><h2>執行結果</h2><pre id="log" class="log">等待操作...</pre></main><script>async function show(p){document.getElementById('log').textContent=typeof p==='string'?p:JSON.stringify(p,null,2)}async function richmenu(){show('建立中...');let r=await fetch('/api/admin/richmenu',{method:'POST'});show(await r.json())}async function health(){show(await (await fetch('/healthz')).json())}async function debug(){show(await (await fetch('/api/line/debug/latest')).json())}async function upload(){const f=document.getElementById('file').files[0];if(!f)return show('請先選擇檔案');const fd=new FormData();fd.append('file',f);const r=await fetch('/api/admin/import-performance',{method:'POST',body:fd});show(await r.json())}</script></body></html>
