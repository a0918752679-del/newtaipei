<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>後端管理</title><link rel="stylesheet" href="/css/app.css"></head><body><div id="app" class="app-shell"><main id="login" class="card login-box"><h2>後端管理登入</h2><p class="notice">預設管理密碼：Wayne0118。正式上線後建議於 Zeabur 環境變數改成更高強度密碼。</p><form id="loginForm"><label>管理密碼<input id="password" class="input" type="password" placeholder="Wayne0118" required></label><button class="btn" style="margin-top:14px" type="submit">登入</button></form></main><main id="panel" style="display:none"><div class="section-title"><h2>後端管理面板</h2><button id="logout" class="btn ghost">登出</button></div><div id="counts" class="section"></div><section class="section admin-grid"><div class="card"><h2>Excel 匯入</h2><p class="notice">支援 .xlsx / .xls / .csv。可辨識欄位：日期、月份、行政區、場次、機台編號、車牌、噪音標準、量測分貝、超標分貝、辨識量、超標件數、告發件數、通知到檢件數。</p><form id="importForm"><label>匯入模式<select name="mode"><option value="append">追加資料</option><option value="replace">覆蓋成果資料</option></select></label><label style="display:block;margin-top:12px">資料檔<input class="input" name="file" type="file" accept=".xlsx,.xls,.csv" required></label><button class="btn green" style="margin-top:14px" type="submit">匯入資料</button></form></div><div class="card"><h2>管理設定</h2><form id="settingsForm"><label>年度目標場次<input id="settingsGoal" class="input" type="number"></label><button class="btn" style="margin-top:14px" type="submit">儲存設定</button></form><hr style="border:0;border-top:1px solid #dce8f8;margin:18px 0"><a class="btn orange" href="/api/admin/export.xlsx">一鍵匯出 Excel 總表</a><button id="downloadRichSpec" class="btn ghost" style="margin-top:10px">下載 LINE Rich Menu JSON</button><button id="reset" class="btn danger" style="margin-top:10px">還原範例資料</button></div></section><section class="section card"><div class="section-title"><h2>近期資料預覽</h2><a class="btn ghost" href="/assets/line-rich-menu.jpg" target="_blank">查看圖文選單圖片</a></div><div class="table-wrap"><table><thead><tr><th>日期</th><th>場次</th><th>行政區</th><th>地點</th><th>車牌</th><th>告發</th><th>通檢</th></tr></thead><tbody id="recordPreview"></tbody></table></div></section></main></div><script src="/js/common.js"></script><script src="/js/admin.js"></script></body></html>
