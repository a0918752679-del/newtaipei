<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>成果查詢系統</title><link rel="stylesheet" href="/css/app.css"></head><body><div id="app" class="app-shell"><div class="dashboard-layout"><aside class="side"><h3>圖層與查詢條件</h3><form id="filterForm"><div class="filter-group"><label>月份</label><select id="month"></select><label>行政區</label><select id="district"></select><label>時段</label><select id="timePeriod"></select><label>關鍵字 / 機號 / 場次</label><input id="keyword" class="input" placeholder="例：淡水、S199、OE_ZB004"><div style="display:grid;gap:10px;margin-top:14px"><button class="btn" type="submit">套用查詢</button><button class="btn ghost" id="clearFilters" type="button">清除條件</button></div></div><div class="filter-group"><h3>圖層控制</h3><label><input type="checkbox" checked> 移動式聲音照相點位</label><label><input type="checkbox" checked> AI 熱區分析</label><label><input type="checkbox" checked> 年度執行成果</label><label><input type="checkbox" checked> 百大建議點位</label></div></form><div class="filter-group" style="color:#cfe5ff;font-size:13px;line-height:1.6">最後更新：<span id="updatedAt"></span></div></aside><main><section class="card" id="kpi"><div class="section-title"><h2>計畫執行進度</h2><a class="btn green" href="/field-report.html">新增外勤回報</a></div><div class="progress-line"><i id="progressRate" style="width:0%"></i></div><div id="kpis" class="kpi-grid" style="margin-top:14px"></div></section><section class="section" id="map"></section><section class="section chart-row"><div class="card chart"><div class="section-title"><h2>月分統計</h2></div><div id="monthly"></div></div><div class="card chart"><div class="section-title"><h2>行政區統計</h2></div><div id="districts"></div></div></section><section class="section chart-row"><div class="card chart"><div class="section-title"><h2>時段統計</h2></div><div id="times"></div></div><div class="card chart"><div class="section-title"><h2>車號超標排行</h2><a class="btn ghost" href="/plate.html">查車號</a></div><div id="plates"></div></div></section><section class="section card"><div class="section-title"><h2>近期成果明細</h2><a class="btn ghost" href="/admin.html">匯出總表</a></div><div class="table-wrap"><table><thead><tr><th>日期</th><th>場次</th><th>行政區</th><th>地點</th><th>時段</th><th>機台</th><th>車號</th><th>超標dB</th><th>告發</th><th>通檢</th><th>成案</th></tr></thead><tbody id="recordsBody"></tbody></table></div></section></main></div></div><script src="/js/common.js"></script><script src="/js/dashboard.js"></script></body></html>
