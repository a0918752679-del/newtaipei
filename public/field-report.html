<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>外勤人員回報平台</title><link rel="stylesheet" href="/css/app.css"></head><body><div id="app" class="app-shell"><main class="section card"><div class="section-title"><h2>外勤場次回報</h2><button id="gps" class="btn ghost" type="button">抓取手機定位</button></div><div class="notice">此頁可直接放入 LINE BOT 圖文選單。外勤人員完成架設、校正、撤收或異常排除後，於手機填寫即可進入後端資料庫。</div><form id="form" class="form-grid" style="margin-top:18px"><label>日期<input id="date" name="date" class="input" type="date" required></label><label>回報類型<select name="reportType"><option>架設完成</option><option>設備校正</option><option>撤收完成</option><option>異常回報</option></select></label><label>行政區<select id="district" name="district" required></select></label><label>執行場次<input class="input" name="sessionNo" placeholder="例：S199"></label><label>機台編號<input class="input" name="machineNo" placeholder="例：OE_ZB004"></label><label>校正值<input class="input" name="calibrationValue" type="number" step="0.1" placeholder="例：93.9"></label><label>路段限速<input class="input" name="speedLimit" type="number" value="50"></label><label>噪音標準<input class="input" name="noiseStandard" type="number" value="86"></label><label class="full">執勤地點<input class="input" name="location" placeholder="例：淡水區新市一路一段 Times 停車場旁人行道" required></label><label>緯度<input id="lat" class="input" name="lat" placeholder="25.xxxxxx"></label><label>經度<input id="lng" class="input" name="lng" placeholder="121.xxxxxx"></label><label>時段<select name="timePeriod"><option>上午</option><option>下午</option><option>晚間</option><option>深夜</option></select></label><label>監測時數<input class="input" name="monitorHours" type="number" value="4"></label><label>車牌號碼<input class="input" name="plateNo" placeholder="選填，例：ABC-1234"></label><label>量測分貝<input class="input" name="dbMeasured" type="number" step="0.1" placeholder="選填"></label><label>車流辨識量<input class="input" name="detectCount" type="number" placeholder="選填"></label><label>超標件數<input class="input" name="exceedCount" type="number" placeholder="選填"></label><label>告發件數<input class="input" name="citationCount" type="number" placeholder="選填"></label><label>通知到檢件數<input class="input" name="inspectionCount" type="number" placeholder="選填"></label><label class="full">備註<textarea name="notes" placeholder="例：告示牌已確認、電力正常、風速偏高需追蹤"></textarea></label><label class="full"><input type="checkbox" name="syncToRecord"> 同步建立成果資料紀錄</label><div class="full"><button class="btn green" type="submit">送出回報</button></div></form><div id="result" style="margin-top:14px"></div></main></div><script src="/js/common.js"></script><script src="/js/field.js"></script></body></html>
